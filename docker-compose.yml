version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: floework-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-floework}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - floework-net

  redis:
    image: redis:7-alpine
    container_name: floework-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - floework-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: floework-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-floework}?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-for-jwt-auth-in-dev-only-change-in-prod}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - PORT=5001
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    ports:
      - "5001:5001"
    networks:
      - floework-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: floework-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - floework-net

networks:
  floework-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
